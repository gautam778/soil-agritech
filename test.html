<!DOCTYPE html>
<html>
<body>

<button onclick="testAPI()">Test API</button>

<script>
function testAPI() {
  fetch("http://127.0.0.1:10000/predict", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      ph: 6.5,
      n: 40,
      p: 30,
      k: 20,
      temperature: 25
    })
  })
  .then(res => res.json())
  .then(data => alert(JSON.stringify(data)))
}
</script>

</body>
</html>
